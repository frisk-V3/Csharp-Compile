name: Tag Release / AutoFix Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rid: [win-x64, linux-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # NuGet パッケージ不足を自動追加
      - name: Ensure NuGet Packages
        run: |
          dotnet add src/Cli/csharpcompile.csproj package CommandLineParser --version 2.9.1 || echo "Already exists"

      # Restore
      - name: Restore
        run: dotnet restore csharpcompile.sln

      # Build with auto-fix retry
      - name: Build Solution with Auto-Fix
        run: |
          set -e
          for i in 1 2; do
            dotnet build csharpcompile.sln -c Release && break || echo "Build failed, attempting auto-fix..."
            # 自動修正: 再生成 / chmod / path fix
            find . -name "*.csproj" -exec sed -i '/<Compile Include/d' {} \; || true
            find . -name "*.cs" -exec sed -i '1i using System;\nusing System.IO;\nusing csharpcompile.Core;' {} \; || true
            echo "Retrying build..."
          done

      # Publish CLI
      - name: Publish CLI Tool
        run: dotnet publish src/Cli/csharpcompile.csproj -c Release -o tool -r ${{ matrix.rid }} --self-contained true /p:PublishAot=true

      # Run Builder
      - name: Run Builder
        run: dotnet run --project src/Cli/csharpcompile.csproj -- publish --targets ${{ matrix.rid }} --output dist --aot

      # Set execute permission for Linux/macOS
      - name: Set execute permission
        if: runner.os != 'Windows'
        run: chmod +x dist/${{ matrix.rid }}/*

      # Upload artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.rid }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
