name: Tag Release

# タグPushだけでなく手動起動も可能にする
on:
  push:
    tags:
      - "v*"  # 新規タグPushで実行
  workflow_dispatch: {}   # 手動起動も可能

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rid: [win-x64, linux-x64, osx-arm64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore csharpcompile.sln

      - name: Build Solution
        run: dotnet build csharpcompile.sln -c Release

      - name: Publish CLI Tool
        run: dotnet publish src/Cli/csharpcompile.csproj -c Release -o tool -r ${{ matrix.rid }} --self-contained true /p:PublishAot=true

      - name: Run Builder
        run: dotnet run --project src/Cli/csharpcompile.csproj -- publish --targets ${{ matrix.rid }} --output dist --aot

      - name: Set execute permission (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x dist/${{ matrix.rid }}/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.rid }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}  # タグPushのタグ名 or workflow_dispatch時に選択可能
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
